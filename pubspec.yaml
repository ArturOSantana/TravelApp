name: travel_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^13.0.0
  image_picker: ^1.1.2
  firebase_storage: ^13.2.0
  path: ^1.9.0
  http: ^1.1.0
  firebase_messaging: ^16.1.3  # Push notifications
  shared_preferences: ^2.3.3   # Cache local
  connectivity_plus: ^7.1.1    # Detectar conexão
  smooth_page_indicator: ^2.0.1  # Indicador de onboarding
  cached_network_image: ^3.4.1  # Cache de imagens
  geolocator: ^13.0.2
  reorderable_grid_view: ^2.2.8 # Drag and drop para reordenar

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
