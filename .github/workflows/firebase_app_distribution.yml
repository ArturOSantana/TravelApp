name: Firebase App Distribution

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create API Keys file
        run: |
          cat > lib/config/api_keys.dart << 'EOF'
          class ApiKeys {
            static const String geoapify = '${{ secrets.GEOAPIFY_API_KEY }}';
            static const String openWeatherMap = '${{ secrets.OPENWEATHERMAP_API_KEY }}';
          }
          EOF

      - name: Run Tests
        run: flutter test

      - name: Auto Increment Version
        id: versioning
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo $VERSION | cut -d+ -f1)
          BUILD_NUMBER=$(echo $VERSION | cut -d+ -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEW_VERSION="$VERSION_NAME+$NEW_BUILD_NUMBER"
          sed -i "s/version: $VERSION/version: $NEW_VERSION/" pubspec.yaml
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        run: flutter build apk --release --build-name=${{ steps.versioning.outputs.new_version }} --build-number=${{ github.run_number }}

      - name: Create Release Notes
        run: echo "Build automatizada. Versao ${{ steps.versioning.outputs.new_version }} - Testes validados" > release_notes.txt

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk --app 1:660606500922:android:7a5e698da565dc9a34f503 --groups "TCC_DS,TCC_APRESENTACAO" --release-notes-file release_notes.txt
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}